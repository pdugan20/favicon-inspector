name: Favicon Monitor

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  monitor:
    name: Monitor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Capture snapshot, fail on ALERT
        run: npm start -- --fail-on alert
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: favicon-reports-${{ github.run_number }}
          path: reports/
          retention-days: 30
